<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="popupTitle">Twitch Ads muter</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main>
      <h1 data-i18n="popupHeading">Twitch Ads muter</h1>
      <p id="channel" class="hint" data-i18n="channelAutoChecking">
        Auto-checking current channel...
      </p>
      <section class="ad-stats" aria-live="polite">
        <p id="mutedToday" class="stat">
          <span data-i18n="mutedTodayLabel">Ads muted today:</span>
          <span class="stat-value">-</span>
        </p>
        <p id="mutedTotal" class="stat">
          <span data-i18n="mutedTotalLabel">Total ads muted:</span>
          <span class="stat-value">-</span>
          <span id="mutedTotalSub" class="stat-sub is-hidden"></span>
        </p>
        <p id="mutedTime" class="stat">
          <span data-i18n="mutedTimeLabel">Total muted time:</span>
          <span class="stat-value">-</span>
          <span id="mutedTimeSub" class="stat-sub is-hidden"></span>
        </p>
      </section>
      <button id="muteToggle" class="toggle" aria-pressed="true">
        <span class="toggle-label" data-i18n="toggleMuteLabel">Mute ads</span>
        <span class="toggle-switch" aria-hidden="true"></span>
      </button>
      <button id="notifyToggle" class="toggle" aria-pressed="true">
        <span class="toggle-label" data-i18n="toggleNotifyLabel">
          Audio notifications
        </span>
        <span class="toggle-switch" aria-hidden="true"></span>
      </button>
    </main>
    <script src="index.js"></script>
  </body>
</html>
